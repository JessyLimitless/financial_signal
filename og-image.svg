<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8556d"/>
      <stop offset="100%" stop-color="#ff7a8e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="950" cy="200" r="180" fill="#e8556d" opacity=".04"/>
  <circle cx="200" cy="500" r="140" fill="#ff7a8e" opacity=".03"/>

  <!-- Candlestick abstract -->
  <g transform="translate(780,150)" opacity=".08">
    <rect x="0" y="30" width="10" height="70" fill="#e8556d" rx="1"/><line x1="5" y1="10" x2="5" y2="120" stroke="#e8556d" stroke-width=".8"/>
    <rect x="25" y="15" width="10" height="90" fill="#4ade80" rx="1"/><line x1="30" y1="0" x2="30" y2="115" stroke="#4ade80" stroke-width=".8"/>
    <rect x="50" y="45" width="10" height="50" fill="#e8556d" rx="1"/><line x1="55" y1="25" x2="55" y2="110" stroke="#e8556d" stroke-width=".8"/>
    <rect x="75" y="10" width="10" height="80" fill="#4ade80" rx="1"/><line x1="80" y1="0" x2="80" y2="100" stroke="#4ade80" stroke-width=".8"/>
    <rect x="100" y="25" width="10" height="60" fill="#4ade80" rx="1"/><line x1="105" y1="5" x2="105" y2="100" stroke="#4ade80" stroke-width=".8"/>
    <rect x="125" y="50" width="10" height="55" fill="#e8556d" rx="1"/><line x1="130" y1="30" x2="130" y2="120" stroke="#e8556d" stroke-width=".8"/>
    <rect x="150" y="20" width="10" height="65" fill="#4ade80" rx="1"/><line x1="155" y1="0" x2="155" y2="95" stroke="#4ade80" stroke-width=".8"/>
    <rect x="175" y="40" width="10" height="45" fill="#e8556d" rx="1"/><line x1="180" y1="20" x2="180" y2="105" stroke="#e8556d" stroke-width=".8"/>
    <rect x="200" y="10" width="10" height="75" fill="#4ade80" rx="1"/><line x1="205" y1="0" x2="205" y2="95" stroke="#4ade80" stroke-width=".8"/>
    <rect x="225" y="30" width="10" height="55" fill="#e8556d" rx="1"/><line x1="230" y1="10" x2="230" y2="100" stroke="#e8556d" stroke-width=".8"/>
    <rect x="250" y="15" width="10" height="70" fill="#4ade80" rx="1"/><line x1="255" y1="0" x2="255" y2="95" stroke="#4ade80" stroke-width=".8"/>
    <rect x="275" y="35" width="10" height="50" fill="#4ade80" rx="1"/><line x1="280" y1="15" x2="280" y2="100" stroke="#4ade80" stroke-width=".8"/>
  </g>

  <!-- Series badge -->
  <text x="80" y="195" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" font-weight="600" letter-spacing="4" fill="#f0c050" opacity=".85">DART INSIGHT SERIES</text>

  <!-- Accent line -->
  <line x1="80" y1="215" x2="200" y2="215" stroke="url(#accent)" stroke-width="2.5" opacity=".8"/>

  <!-- Title -->
  <text x="80" y="290" font-family="Georgia,serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-2">Financial</text>
  <text x="80" y="370" font-family="Georgia,serif" font-size="68" font-weight="900" fill="url(#accent)" font-style="italic" letter-spacing="-2">Signal</text>

  <!-- Subtitle -->
  <text x="80" y="425" font-family="Helvetica Neue,Arial,sans-serif" font-size="20" font-weight="300" fill="#94a3b8">재무제표가 보내는 시그널을 읽는 법</text>

  <!-- Quote -->
  <text x="80" y="490" font-family="Georgia,serif" font-size="14" font-style="italic" fill="#64748b" opacity=".7">"재무제표는 경영진이 쓴 자서전이다. 쓰인 것보다 빠진 것이 더 중요하다."</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity=".7"/>

  <!-- Author -->
  <text x="80" y="570" font-family="Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="400" fill="#475569">주식회사 뮤즈에이아이</text>
</svg>
